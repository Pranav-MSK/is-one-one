name: Welcome Bot
 
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
 
jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
 
    steps:
      - name: Welcome First-Time Issue Author
        if: github.event_name == 'issues'
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to the chaos, @${{ github.event.issue.user.login }}!
 
            Thanks for opening your first issue on **is-one-one**. Our team (of tired
            engineering students) will look into this soon! 🎉
 
            While you wait, feel free to browse our [Methods Directory](https://github.com/Py-Contributors/is-one-one/blob/main/docs/METHODS.md)
            and marvel at all the unnecessary ways we've already proven that `1 == 1`.
 
      - name: Welcome First-Time PR Author
        if: github.event_name == 'pull_request_target'
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            👋 Welcome to the chaos, @${{ github.event.pull_request.user.login }}!
 
            Thanks for opening your first PR on **is-one-one**. Our team (of tired
            engineering students) will look into this soon! 🎉
 
            Our CI bot will now run the **Automated Logic Suite** to confirm that your
            contribution hasn't accidentally caused `1 != 1`. Sit tight — mathematics
            is being verified as we speak. 🧠
